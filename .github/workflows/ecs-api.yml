name: Deploy .NET API to ECS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'  # Update to your version

    - name: Build React and push to ECR
      id: build-image
      run: |
        # Timestamp tag
        IMAGE_TAG=$(date +%d%m%Y%H%M%S)
        ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
        ECR_REPO="${{ secrets.ECR_REPOSITORY }}"  # poc-dotnet-dev
        FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"
        
        echo "Building .NET API: $FULL_IMAGE"
        
        # Build and publish .NET
        dotnet restore
        dotnet publish -c Release -o ./publish
        
        # .NET API Dockerfile
        cat > Dockerfile << EOF
        FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine AS base
        WORKDIR /app
        EXPOSE 8080
        
        FROM mcr.microsoft.com/dotnet/sdk:8.0-alpine AS build
        WORKDIR /src
        COPY ["YourProject.csproj", "."]
        RUN dotnet restore "YourProject.csproj"
        COPY . .
        WORKDIR "/src"
        RUN dotnet build "YourProject.csproj" -c Release -o /app/build
        
        FROM build AS publish
        RUN dotnet publish "YourProject.csproj" -c Release -o /app/publish /p:UseAppHost=false
        
        FROM base AS final
        WORKDIR /app
        COPY --from=publish /app/publish .
        ENTRYPOINT ["dotnet", "YourProject.dll"]
        EOF
        
        # Build & push
        docker build --no-cache -t "$FULL_IMAGE" .
        docker push "$FULL_IMAGE"
        echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT

    - name: Fill task definition with new image
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: poc-dotnet-task.json  # Create this file below
        container-name: poc-dotnet-task
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy to ECS service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: poc-dotnet-dev
        cluster: poc-dev
        wait-for-service-stability: true
